<body>
    <main>  
        <h1>JavaScript Calculations</h1>
        <p>Calculate the result of two numbers based on user input using multiplication and addition.</p>
            <form id="form">
                <div class="form-field">
                    <label for="first-number">Number 1:</label>
                        <input type="text" id="first-number" value="" autofocus>
                </div>

                <div class="form-field">
                    <label for="second-number">Number 2:</label>    
                        <input type="text" id="second-number" value="">
                </div>

                <div class="form-field">
                    <label for="num1"></label>
                        <input type="button" onclick="multiplyBy()" value="Multiply" id="num1">
                </div>

                <div class="form-field">
                    <label for="num2"></label>
                        <input type="button" onclick="addTogether()" value="Add" id="num2">
                </div>
                <div class="form-field">
                    <label for="num2"></label>
                        <input type="reset" value="Clear Form">
                </div>
            </form>
        <p><b>The Result is:</b></p>
        <p class="output">
            <span id="result"></span>
        </p>
    </main>
