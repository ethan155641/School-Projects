<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractured Humpty Dumpty</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #1e90ff;
        }
        p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Humpty Dumpty?</h1>
    <p id="output"></p>

    <script>
        /*<![CDATA[*/

        
        var character=prompt("Enter the name of a character:", "Humpty Dumpty");
        var place=prompt("Enter a place:", "wall");
        var action=prompt("Enter an action that caused a fall:", "fell");
        var emotion=prompt("Enter an emotion:", "sadly");
        var object=prompt("Enter an object that broke:", "shell");
        var rescuer1=prompt("Enter a rescuer:", "King’s men");
        var rescuer2=prompt("Enter another rescuer:", "horses");
        var result=prompt("Enter the outcome:", "couldn’t put together");

        document.writeln("<p>" + character + " sat on a " + place + ".</p>");
        document.writeln("<p>" + character + " " + action + " down " + emotion + " with a bawl.</p>");
        document.writeln("<p>All the " + rescuer1 + " and all the " + rescuer2 + " tried their best.</p>");
        document.writeln("<p>But " + character + "'s " + object + " was broken, they failed the test.</p>");
        document.writeln("<p>" + character + " could not be put back together again.</p>");
        document.writeln("<p>Now he sits in pieces, bringing them pain.</p>");
        document.writeln("<p>They tried glue, nails, and a brand new tether,</p>");
        document.writeln("<p>But still " + rescuer1 + " and the " + rescuer2 + " " + result + " together.</p>");
        document.writeln("<p>In the end, they decided it was better to let go,</p>");
        document.writeln("<p>And leave " + character + " to lay there, high and low.</p>");
        
        /*]]>*/
    </script>
    
    <footer>
        <p><a href="https://validator.w3.org/nu/?doc=https%3A%2F%2Flanfeare538.macombserver.net%2Fitwp1000%2Fnuresryrhyme.html">HTML5 Validation</a></p>
        <p><a href="home.html">Back to Homepage</a></p>
    </footer>
</body>
</html>
